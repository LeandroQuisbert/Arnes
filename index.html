                        // Check for autosave
                        try {
                            const autosaveStr = localStorage.getItem('arnesviz.autosave');
                            if (autosaveStr) {
                                const autosaveProject = JSON.parse(autosaveStr);
                                showModal(
                                    "Autosave found",
                                    "An autosave of your previous work was found. Would you like to restore it?",
                                    ['restore', 'discard_autosave']
                                );
                                $modalBtnRestore.onclick = () => {
                                    loadProject(autosaveProject, 'load');
                                    $welcomeScreen.classList.add('hidden');
                                    hideModal();
                                };
                                $modalBtnDiscardAutosave.onclick = () => {
                                    localStorage.removeItem('arnesviz.autosave');
                                    hideModal();
                                };
                            }
                        } catch (e) {
                            console.warn("Could not parse autosave:", e);
                        }
                    } else {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return;
                }
                const projectJson = await response.json();
                const success = await loadProject(projectJson, 'load');
                if (success) {
                    $welcomeScreen.classList.add('hidden');
                } else {
                    // If load failed due to incompatibility, still show welcome screen
                    $welcomeScreen.classList.remove('hidden');
                }
            } catch (e) {
                console.error("Error fetching initial project:", e);
                updateState({
                    logs: [...state.logs, { level: 'error', message: `Failed to fetch db.json: ${e.message}`, timestamp: new Date().toISOString(), entityId: null }]
                });
                $welcomeScreen.classList.remove('hidden');
            }
        }

        // Start the initial fetch process
        fetchInitialProject();


        // --- EXPORT PROJECT ---
        async function exportProject() {
            if (!state.project) {
                console.error("No project to export.");
                return;
            }
            try {
                const updatedProject = structuredClone(state.project);
                updatedProject.metadata.version = (updatedProject.metadata.version || 0) + 1;
                updatedProject.metadata.lastSave = new Date().toISOString();
                updatedProject.metadata.savedBy = state.currentUser || updatedProject.metadata.savedBy || "unknown";

                const validationLogs = validateProject(updatedProject);
                const hasErrors = validationLogs.some(l => l.level === 'error');
                if (hasErrors) {
                    // Show validation errors and ask for confirmation
                    const errorMessages = validationLogs.filter(l => l.level === 'error').map(l => l.message).join('\n');
                    showModal(
                        "Validation Errors Found",
                        `The project has validation errors:\n\n${errorMessages}\n\nDo you still want to export?`,
                        ['ok', 'cancel'] // OK proceeds with export despite errors
                    );
                    $modalBtnOk.onclick = () => {
                        // Proceed with export even if errors exist
                        const jsonString = JSON.stringify(updatedProject, null, 2);
                        const blob = new Blob([jsonString], { type: 'application/json' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        const projectName = updatedProject.metadata.projectInfo.name || 'project';
                        const version = updatedProject.metadata.version;
                        a.download = `${projectName}-v${version}.json`;
                        document.body.appendChild(a);
                        a.click();
                        setTimeout(() => {
                          document.body.removeChild(a);
                          window.URL.revokeObjectURL(url);
                          updateState({
                              project: updatedProject, // Apply the updated project to state
                              isDirty: false,
                              logs: [...state.logs, { level: 'info', message: 'Project exported successfully', timestamp: new Date().toISOString(), entityId: null }]
                          });
                        }, 100);
                        hideModal();
                    };
                    $modalBtnCancel.onclick = hideModal;
                    return; // Don't proceed until modal is resolved
                }

                // If no errors, proceed directly
                const jsonString = JSON.stringify(updatedProject, null, 2);
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const projectName = updatedProject.metadata.projectInfo.name || 'project';
                const version = updatedProject.metadata.version;
                a.download = `${projectName}-v${version}.json`;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                  document.body.removeChild(a);
                  window.URL.revokeObjectURL(url);
                  updateState({
                      project: updatedProject, // Apply the updated project to state
                      isDirty: false,
                      logs: [...state.logs, { level: 'info', message: 'Project exported successfully', timestamp: new Date().toISOString(), entityId: null }]
                  });
                }, 100);

            } catch (e) {
                console.error("Error exporting project:", e);
                updateState({
                    logs: [...state.logs, { level: 'error', message: `Failed to export project: ${e.message}`, timestamp: new Date().toISOString(), entityId: null }]
                });
            }
        }


        // --- IMPORT PROJECT ---
        async function importProject(file) {
            try {
                const jsonString = await file.text();
                const jsonData = JSON.parse(jsonString);

                // Check for unsaved changes
                if (state.isDirty && state.project && state.project.data && (state.project.data.containers.length > 0 || state.project.data.connectors.length > 0 || state.project.data.wires.length > 0 || state.project.data.mates.length > 0)) {
                    showModal(
                        "Unsaved changes",
                        "There are unsaved changes. Do you want to export the current file before importing?",
                        ['export', 'discard', 'cancel']
                    );
                    $modalBtnExport.onclick = async () => {
                        await exportProject(); // Export first
                        const success = await loadProject(jsonData, 'import');
                        if (success) {
                            $welcomeScreen.classList.add('hidden');
                        }
                        hideModal();
                    };
                    $modalBtnDiscard.onclick = () => {
                        const success = loadProject(jsonData, 'import');
                        if (success) {
                            $welcomeScreen.classList.add('hidden');
                        }
                        hideModal();
                    };
                    $modalBtnCancel.onclick = hideModal;
                    return; // Don't proceed until modal is resolved
                }

                // Direct import if no conflicts
                const success = await loadProject(jsonData, 'import');
                if (success) {
                    $welcomeScreen.classList.add('hidden');
                }

            } catch (e) {
                console.error("Error importing project:", e);
                updateState({
                    logs: [...state.logs, { level: 'error', message: `Failed to import project: ${e.message}`, timestamp: new Date().toISOString(), entityId: null }]
                });
            }
        }


        // --- AUTOSAVE ---
        setInterval(() => {
            if (state.isDirty && state.project) {
                try {
                    localStorage.setItem('arnesviz.autosave', JSON.stringify(state.project));
                    // Optionally log success silently or less frequently
                } catch (e) {
                    console.warn("Could not save autosave to localStorage:", e);
                    updateState({
                        logs: [...state.logs, {
                            level: 'warning',
                            message: `localStorage autosave failed: ${e.message}`,
                            timestamp: new Date().toISOString(),
                            entityId: null
                        }]
                    });
                }
            }
        }, 30000); // Every 30 seconds

            loadProject(newProject, 'import');
            $welcomeScreen.classList.add('hidden');
        });

        // File input change
        $fileInput.addEventListener('change', (event) => {
            if (event.target.files.length > 0) {
                importProject(event.target.files[0]);
                event.target.value = ''; // Reset input
            }
        });

        // Config Buttons
        $btnImportConfig.addEventListener('click', () => {
            $fileInput.click();
        });

        $btnExportConfig.addEventListener('click', exportProject);

        // View Tabs
        $viewTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                updateState({ activeView: tab.dataset.view });
            });
        });

        // Edit Mode Toggle
        $btnEditMode.addEventListener('click', () => {
            updateState({ editMode: !state.editMode });
        });

        // Config Button
        $btnConfig.addEventListener('click', () => {
            updateState({ sidebarState: state.sidebarState === 'config' ? 'closed' : 'config' });
        });

        // Close Sidebar Button
        $btnCloseSidebar.addEventListener('click', () => {
            updateState({ sidebarState: 'closed' });
        });

        // Collapse Log Panel
        $btnCollapseLog.addEventListener('click', () => {
            $logPanel.classList.toggle('collapsed');
            $btnCollapseLog.textContent = $logPanel.classList.contains('collapsed') ? 'Expand' : 'Collapse';
        });

        // Clear Log Panel
        $btnClearLog.addEventListener('click', () => {
            updateState({ logs: [] });
        });

        // Filter Search Input Events
        $filterSearch.addEventListener('blur', () => {
            $filterSearch.style.display = 'none';
        });

        // --- Keyboard Shortcuts (11.7) ---
        document.addEventListener('keydown', (event) => {
            if (event.ctrlKey && event.shiftKey && event.key.toLowerCase() === 'e') {
                event.preventDefault();
                updateState({ editMode: !state.editMode });
            }
            if (event.ctrlKey && event.key.toLowerCase() === 's') {
                event.preventDefault();
                exportProject();
            }
            if (event.ctrlKey && event.key.toLowerCase() === 'o') {
                event.preventDefault();
                $fileInput.click(); // Trigger import
            }
            if (event.key === 'Escape') {
                // Close sidebar if open, or deselect entity if details are shown
                if (state.sidebarState !== 'closed') {
                    updateState({ sidebarState: 'closed' });
                } else if (state.selectedEntity) {
                     updateState({ selectedEntity: null }); // Assuming this triggers deselection
                 }
            }
            if (event.key === 'f' || event.key === 'F') {
                 event.preventDefault(); // Prevent default F behavior
                 $filterSearch.style.display = 'inline-block';
                 $filterSearch.focus();
                 // Implement filter logic later
             }
        });

        // Initialize UI based on initial state
        syncStateToUI(state);
        renderLogs(state.logs); // Initial log render
        // Apply initial transform
        applyTransform();

    </script>
</body>
</html>
