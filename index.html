<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArnesViz</title>
    <style>
        /* 11.8.1 Dark Mode Colors & 11.8.2 Neumorphic Effects */
        :root {
            --bg-primary: #0a0a0f;
            --panel-bg: #141420;
            --panel-border: #2a2a3a;
            --text-main: #f0f0f0;
            --text-secondary: #9ca3af;
            --accent-primary: #6366f1;
            --accent-primary-dark: #4f46e5;
            --accent-secondary: #fbbf24;
            --accent-glow: #d97706; /* Gold for highlights */
            --error: #ef4444;
            --warning: #ffcc00;
            --info: #3b82f6;
            --neumorph-light: rgba(255, 255, 255, 0.05);
            --neumorph-dark: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow: hidden; /* Prevent default scroll on main body */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Styles (11.2) */
        header {
            background-color: var(--panel-bg);
            color: var(--text-main);
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--panel-border);
            min-height: 50px; /* Minimum fixed height */
            /* Exact Neumorphism Raised (11.8.2) */
            box-shadow: 6px 6px 12px rgba(0,0,0,0.6), -6px -6px 12px rgba(40,50,80,0.15);
        }

        .header-left, .header-center, .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-left span:first-child { /* App name */
            font-weight: bold;
            color: var(--accent-secondary);
        }

        .view-tabs {
            display: flex;
            background-color: var(--neumorph-light);
            border-radius: 8px;
            padding: 0.25rem;
        }

        .view-tab {
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .view-tab.active {
            background-color: var(--accent-primary);
        }

        .btn-edit-mode, .btn-config {
            background: none;
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            /* Exact Neumorphism Sunken (11.8.2) */
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.5), inset -4px -4px 8px rgba(40,50,80,0.1);
        }

        .btn-edit-mode:hover, .btn-config:hover {
            background-color: var(--neumorph-light);
            /* Invert sunken effect on hover */
            box-shadow: 4px 4px 8px rgba(0,0,0,0.5), -4px -4px 8px rgba(40,50,80,0.1);
        }

        .btn-edit-mode.active {
            background-color: var(--accent-primary);
        }

        /* Work Area */
        .work-area {
            flex: 1;
            display: flex;
            overflow: hidden; /* Contain scroll inside visual/table areas later */
            position: relative; /* For overlay positioning */
        }

        #svg-container, #table-container { /* Placeholders for now */
             width: 100%;
             height: 100%;
             overflow: auto;
             background-color: #11111b; /* Slightly different shade for contrast */
             display: flex;
             justify-content: center;
             align-items: center;
         }

         #table-container { display: none; } /* Initially show SVG */


        /* Sidebar Styles (11.13) */
        .sidebar {
            position: fixed;
            top: 0;
            right: -400px; /* Hidden initially */
            width: 380px; /* Fixed width as per cheatsheet */
            height: 100vh;
            background-color: var(--panel-bg);
            border-left: 1px solid var(--panel-border);
            /* Exact Neumorphism Raised (11.8.2) */
            box-shadow: -6px 0 12px rgba(0,0,0,0.6), 6px 0 12px rgba(40,50,80,0.15);
            z-index: 1000;
            transition: right 0.25s ease; /* Updated transition duration (11.8.3) */
            display: flex;
            flex-direction: column;
            overflow: hidden; /* For internal scrolling */
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-title {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .btn-close-sidebar {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .sidebar-content {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
        }

        /* Log Panel Placeholder */
        .log-panel {
            height: 200px; /* Initial height */
            background-color: var(--panel-bg);
            border-top: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.3s ease;
            transform: translateY(0); /* Visible initially */
        }

        .log-panel.collapsed {
            transform: translateY(100%);
        }

        .log-header {
            padding: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--panel-border);
        }

        .log-controls {
            display: flex;
            gap: 0.5rem;
        }

        .log-btn {
            background-color: var(--neumorph-light);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
        }

        .log-content {
            flex: 1;
            padding: 0.5rem;
            font-family: monospace;
            font-size: 0.85rem;
            overflow-y: auto;
            background-color: #0d0d15; /* Darker log bg */
        }

        .log-entry {
            margin-bottom: 0.25rem;
            padding: 0.25rem;
            border-radius: 3px;
        }
        .log-entry.error { background-color: rgba(239, 68, 68, 0.1); border-left: 3px solid var(--error); }
        .log-entry.warning { background-color: rgba(255, 204, 0, 0.1); border-left: 3px solid var(--warning); }
        .log-entry.info { background-color: rgba(59, 130, 246, 0.1); border-left: 3px solid var(--info); }

        /* Responsive Sidebar (<768px, 11.13.2) */
        @media (max-width: 768px) {
            .sidebar.open {
                width: 100vw; /* Full width on mobile */
                right: 0; /* Ensure it covers the screen when open */
            }
        }

        /* Filter Search Input (for F shortcut) */
        #filter-search {
            display: none; /* Hidden by default */
            padding: 0.4rem 0.8rem;
            background-color: var(--neumorph-light);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            border-radius: 6px;
            margin-left: 0.5rem;
        }

        /* Welcome Screen */
        .welcome-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-primary);
            z-index: 100; /* Cover everything */
        }

        .welcome-screen.hidden {
            display: none;
        }

        .welcome-buttons {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
        }

        .btn-welcome {
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            background-color: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal {
            background-color: var(--panel-bg);
            padding: 1.5rem;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--panel-border);
        }

        .modal-header {
            margin-bottom: 1rem;
        }

        .modal-body {
            margin-bottom: 1.5rem;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        .modal-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--panel-border);
            background-color: var(--neumorph-light);
            cursor: pointer;
            border-radius: 4px;
        }

        /* Selection Glow */
        .selection-glow {
            filter: drop-shadow(0 0 8px var(--accent-secondary));
        }

    </style>
</head>
<body>

    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcome-screen">
        <h1>Welcome to ArnesViz</h1>
        <p>No project found. Please import an existing project or create a new one.</p>
        <div class="welcome-buttons">
            <button id="btn-import-welcome" class="btn-welcome">Import JSON</button>
            <button id="btn-create-welcome" class="btn-welcome">Create New Project</button>
        </div>
    </div>

    <header>
        <div class="header-left">
            <span>ArnesViz</span>
            <span id="file-name">- No Project Loaded -</span>
            <!-- Added filter search input -->
            <input type="text" id="filter-search" placeholder="Search...">
        </div>
        <div class="header-center">
            <div class="view-tabs">
                <!-- Reordered tabs: Table first, Visual second -->
                <div class="view-tab" data-view="table">Table</div>
                <div class="view-tab" data-view="visual">Visual</div>
            </div>
        </div>
        <div class="header-right">
            <button id="btn-edit-mode" class="btn-edit-mode">
                Edit Mode
            </button>
            <button id="btn-config" class="btn-config">
                ⚙ Config
            </button>
        </div>
    </header>

    <div class="work-area">
        <div id="svg-container">
            <svg id="svg-canvas" width="100%" height="100%" style="background-color: black;">
                <g id="viewport"></g>
            </svg>
        </div>
        <div id="table-container"> <!-- Placeholder for Table -->
            <p>Data Table will go here.</p>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">Details / Config</div>
            <button class="btn-close-sidebar" id="btn-close-sidebar">&times;</button>
        </div>
        <div class="sidebar-content" id="sidebar-content">
            <p>Sidebar content will appear here based on state.</p>
            <!-- Config Buttons -->
            <div id="config-buttons" style="display: none;">
                <button id="btn-import-config" class="btn-config">Import JSON</button>
                <button id="btn-export-config" class="btn-config">Export JSON</button>
            </div>
            <input type="file" id="file-input" accept=".json" style="display: none;">
        </div>
    </div>

    <div class="log-panel" id="log-panel">
        <div class="log-header">
            <h3>Log</h3>
            <div class="log-controls">
                <button class="log-btn" id="btn-clear-log">Clear</button>
                <button class="log-btn" id="btn-collapse-log">Collapse</button>
            </div>
        </div>
        <div class="log-content" id="log-content">
            <!-- Log entries will be rendered here -->
        </div>
    </div>

    <!-- Modal Template -->
    <div class="modal-overlay" id="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header"><h3 id="modal-title">Modal Title</h3></div>
            <div class="modal-body"><p id="modal-message">Modal Message</p></div>
            <div class="modal-footer">
                <button class="modal-btn" id="modal-btn-ok">OK</button>
                <button class="modal-btn" id="modal-btn-cancel">Cancel</button>
                <button class="modal-btn" id="modal-btn-export">Export and Continue</button>
                <button class="modal-btn" id="modal-btn-discard">Discard and Continue</button>
                <button class="modal-btn" id="modal-btn-restore">Restore</button>
                <button class="modal-btn" id="modal-btn-discard-autosave">Discard</button>
            </div>
        </div>
    </div>

    <script>
        // --- Reactive Global State Management ---
        let _isUpdatingState = false; // Flag added

        // Read initial values from localStorage if available
        const savedActiveView = (() => {
            try {
                return localStorage.getItem('arnesviz.activeView') || 'table'; // Default to 'table'
            } catch (e) {
                console.warn("Could not read arnesviz.activeView from localStorage:", e);
                return 'table';
            }
        })();
        const savedEditMode = (() => {
            try {
                return JSON.parse(localStorage.getItem('arnesviz.editMode')) || false;
            } catch (e) {
                console.warn("Could not read arnesviz.editMode from localStorage:", e);
                return false;
            }
        })();
        const savedZoom = (() => {
            try {
                const val = parseFloat(localStorage.getItem('arnesviz.zoom'));
                return isNaN(val) ? 1.0 : Math.max(0.2, Math.min(3.0, val)); // Clamp to 0.2-3.0
            } catch (e) {
                console.warn("Could not read arnesviz.zoom from localStorage:", e);
                return 1.0;
            }
        })();
        const savedPan = (() => {
            try {
                const str = localStorage.getItem('arnesviz.pan');
                if (str) {
                    const parsed = JSON.parse(str);
                    if (parsed && typeof parsed.x === 'number' && typeof parsed.y === 'number') {
                        return parsed;
                    }
                }
                return { x: 0, y: 0 }; // Default pan
            } catch (e) {
                console.warn("Could not read arnesviz.pan from localStorage:", e);
                return { x: 0, y: 0 };
            }
        })();

        let state = {
            project: null,
            selectedEntity: null,
            sidebarState: 'closed', // 'closed', 'details', 'config'
            // Updated initial activeView
            activeView: savedActiveView,
            editMode: savedEditMode,
            isDirty: false,
            // Added new state properties
            sidebarLastEntity: null,
            filters: { text: '', type: 'all', net: 'all', section: 'all' },
            logs: [{ level: 'info', message: 'Application started', timestamp: new Date().toISOString() }],
            // Added for visual engine
            zoom: savedZoom,
            pan: savedPan
        };

        const subscribers = [];

        function subscribe(callback) {
            subscribers.push(callback);
        }

        function updateState(newState) {
            if (_isUpdatingState) return; // Prevent recursion
            _isUpdatingState = true;
            try {
                const oldState = state;
                state = { ...state, ...newState };

                // Persist specific state changes to localStorage
                if ('activeView' in newState) {
                    try {
                        localStorage.setItem('arnesviz.activeView', state.activeView);
                    } catch (e) {
                        console.warn("Could not write arnesviz.activeView to localStorage:", e);
                        // Log warning directly to state to avoid recursion
                        state.logs = [...state.logs, { level: 'warning', message: `localStorage full: activeView`, timestamp: new Date().toISOString() }];
                    }
                }
                if ('editMode' in newState) {
                    try {
                        localStorage.setItem('arnesviz.editMode', JSON.stringify(state.editMode));
                    } catch (e) {
                        console.warn("Could not write arnesviz.editMode to localStorage:", e);
                        // Log warning directly to state to avoid recursion
                        state.logs = [...state.logs, { level: 'warning', message: `localStorage full: editMode`, timestamp: new Date().toISOString() }];
                    }
                }
                if ('filters' in newState) {
                     try {
                         localStorage.setItem('arnesviz.filters', JSON.stringify(state.filters));
                     } catch (e) {
                         console.warn("Could not write arnesviz.filters to localStorage:", e);
                         // Log warning directly to state to avoid recursion
                         state.logs = [...state.logs, { level: 'warning', message: `localStorage full: filters`, timestamp: new Date().toISOString() }];
                     }
                 }
                 if ('zoom' in newState) {
                     try {
                         localStorage.setItem('arnesviz.zoom', state.zoom.toString());
                     } catch (e) {
                         console.warn("Could not write arnesviz.zoom to localStorage:", e);
                         state.logs = [...state.logs, { level: 'warning', message: `localStorage full: zoom`, timestamp: new Date().toISOString() }];
                     }
                 }
                 if ('pan' in newState) {
                     try {
                         localStorage.setItem('arnesviz.pan', JSON.stringify(state.pan));
                     } catch (e) {
                         console.warn("Could not write arnesviz.pan to localStorage:", e);
                         state.logs = [...state.logs, { level: 'warning', message: `localStorage full: pan`, timestamp: new Date().toISOString() }];
                     }
                 }

                subscribers.forEach(callback => callback(state, oldState));
            } finally {
                _isUpdatingState = false; // Reset flag
            }
        }

        // --- Mark Dirty Function ---
        function markDirty() {
            if (!state.isDirty) {
                updateState({ isDirty: true });
            }
        }

        // --- DOM Elements ---
        const $fileName = document.getElementById('file-name');
        const $viewTabs = document.querySelectorAll('.view-tab');
        const $btnEditMode = document.getElementById('btn-edit-mode');
        const $btnConfig = document.getElementById('btn-config');
        const $sidebar = document.getElementById('sidebar');
        const $btnCloseSidebar = document.getElementById('btn-close-sidebar');
        const $svgContainer = document.getElementById('svg-container');
        const $svgCanvas = document.getElementById('svg-canvas');
        const $svgViewport = document.getElementById('viewport');
        const $tableContainer = document.getElementById('table-container');
        const $btnCollapseLog = document.getElementById('btn-collapse-log');
        const $logPanel = document.getElementById('log-panel');
        const $logContent = document.getElementById('log-content');
        const $btnClearLog = document.getElementById('btn-clear-log');
        const $filterSearch = document.getElementById('filter-search'); // New element
        const $welcomeScreen = document.getElementById('welcome-screen');
        const $btnImportWelcome = document.getElementById('btn-import-welcome');
        const $btnCreateWelcome = document.getElementById('btn-create-welcome');
        const $configButtons = document.getElementById('config-buttons');
        const $btnImportConfig = document.getElementById('btn-import-config');
        const $btnExportConfig = document.getElementById('btn-export-config');
        const $fileInput = document.getElementById('file-input');
        const $modalOverlay = document.getElementById('modal-overlay');
        const $modalTitle = document.getElementById('modal-title');
        const $modalMessage = document.getElementById('modal-message');
        const $modalBtnOk = document.getElementById('modal-btn-ok');
        const $modalBtnCancel = document.getElementById('modal-btn-cancel');
        const $modalBtnExport = document.getElementById('modal-btn-export');
        const $modalBtnDiscard = document.getElementById('modal-btn-discard');
        const $modalBtnRestore = document.getElementById('modal-btn-restore');
        const $modalBtnDiscardAutosave = document.getElementById('modal-btn-discard-autosave');


        // --- Initial State Sync to UI ---
        function syncStateToUI(state) {
            // Update Edit Mode button
            $btnEditMode.classList.toggle('active', state.editMode);

            // Update View Tabs
            $viewTabs.forEach(tab => {
                tab.classList.toggle('active', tab.dataset.view === state.activeView);
            });
            // Show appropriate container
            $svgContainer.style.display = state.activeView === 'visual' ? 'flex' : 'none';
            $tableContainer.style.display = state.activeView === 'table' ? 'flex' : 'none';

            // Update Sidebar
            $sidebar.classList.toggle('open', state.sidebarState !== 'closed');
            // Show config buttons if sidebar state is config
            $configButtons.style.display = state.sidebarState === 'config' ? 'block' : 'none';
            // Update file name if project exists
            if (state.project && state.project.metadata && state.project.metadata.projectInfo && state.project.metadata.projectInfo.name) {
                 $fileName.textContent = `- ${state.project.metadata.projectInfo.name} -`;
             } else {
                 $fileName.textContent = '- No Project Loaded -';
             }
        }

        // --- Log Panel Renderer ---
        function renderLogs(logs) {
            $logContent.innerHTML = ''; // Clear existing content
            logs.forEach(entry => {
                const logDiv = document.createElement('div');
                logDiv.className = `log-entry ${entry.level}`;
                // Format time from ISO string
                const timeStr = new Date(entry.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                logDiv.textContent = `[${timeStr}] ${entry.message}`;
                $logContent.appendChild(logDiv);
            });
            // Scroll to bottom after updating
            $logContent.scrollTop = $logContent.scrollHeight;
        }

        // --- Calculate Absolute Position ---
        function getAbsolutePosition(entityId, entityMap, containerMap) {
            const entity = entityMap[entityId];
            if (!entity) return { x: 0, y: 0 };

            let absX = 0;
            let absY = 0;

            if (entity.type === 'system') { // Root container
                absX = entity.position.x || 0;
                absY = entity.position.y || 0;
            } else { // Non-root container or connector
                let absX = 0;
                let absY = 0;

                // Si es container, agregar su propio offset primero
                if (entity.position && (entity.position.offsetX !== undefined || entity.position.offsetY !== undefined)) {
                    absX = entity.position.offsetX || 0;
                    absY = entity.position.offsetY || 0;
                }

                // Sumar offsets de todos los ancestros
                let currentId = entity.parent_id;
                let currentContainer = containerMap[currentId];

                while (currentContainer) {
                    if (currentContainer.parent_id === null) {
                        // Root container tiene position.x/y, no offsetX/offsetY
                        absX += currentContainer.position.x || 0;
                        absY += currentContainer.position.y || 0;
                    } else {
                        absX += currentContainer.position.offsetX || 0;
                        absY += currentContainer.position.offsetY || 0;
                    }
                    currentId = currentContainer.parent_id;
                    currentContainer = containerMap[currentId];
                }

                return { x: absX, y: absY };
            }

            return { x: absX, y: absY };
        }

        // --- Calculate Absolute Position for Connectors ---
        function getAbsolutePositionForConnector(connId, entityMap, containerMap) {
            const conn = entityMap[connId];
            if (!conn) {
                console.warn(`getAbsolutePositionForConnector: Connector ${connId} not found in entityMap`);
                return { x: 0, y: 0 };
            }

            const parentContainer = containerMap[conn.parent_id];
            if (!parentContainer) {
                console.warn(`getAbsolutePositionForConnector: Parent container ${conn.parent_id} not found for connector ${connId}`);
                return { x: 0, y: 0 };
            }

            const parentAbsPos = getAbsolutePosition(parentContainer.id, entityMap, containerMap);

            if (conn.mountType === 'fixed') {
                 let x = parentAbsPos.x;
                 let y = parentAbsPos.y;

                 const edgeSide = conn.edgeSide;
                 const offset = conn.offset || 0;
                 const width = conn.size.width || 0;
                 const height = conn.size.height || 0;

                 switch (edgeSide) {
                     case 'left':
                         x = parentAbsPos.x;
                         y = parentAbsPos.y + offset;
                         break;
                     case 'right':
                         x = parentAbsPos.x + (parentContainer.size.width || 0) - width;
                         y = parentAbsPos.y + offset;
                         break;
                     case 'top':
                         x = parentAbsPos.x + offset;
                         y = parentAbsPos.y;
                         break;
                     case 'bottom':
                         x = parentAbsPos.x + offset;
                         y = parentAbsPos.y + (parentContainer.size.height || 0) - height;
                         break;
                 }
                 return { x, y };
            } else { // flying
                 if (!conn.matedId) {
                     console.log(`getAbsolutePositionForConnector: Flying connector ${connId} has no matedId, skipping`);
                     return { x: 0, y: 0 };
                 }

                 // Buscar el mate en project.data.mates (no en entityMap)
                 const mate = state.project.data.mates.find(m => m.id === conn.matedId);
                 if (!mate) {
                     console.warn(`getAbsolutePositionForConnector: Mate ${conn.matedId} not found for flying connector ${connId}`);
                     return { x: 0, y: 0 };
                 }

                 const partnerId = mate.from?.connector === connId ? mate.to?.connector : mate.from?.connector;
                 if (!partnerId) {
                     console.warn(`getAbsolutePositionForConnector: Partner not found in mate ${mate.id}`);
                     return { x: 0, y: 0 };
                 }

                 const partnerConn = entityMap[partnerId];
                 if (!partnerConn) {
                     console.warn(`getAbsolutePositionForConnector: Partner connector ${partnerId} not found`);
                     return { x: 0, y: 0 };
                 }

                 const partnerAbsPos = getAbsolutePositionForConnector(partnerId, entityMap, containerMap);

                 // Calculate position to face the partner, aligned by pin 1
                 let x = partnerAbsPos.x;
                 let y = partnerAbsPos.y;

                 const partnerEdge = partnerConn.edgeSide;
                 const width = conn.size.width || 0;
                 const height = conn.size.height || 0;

                 switch (partnerEdge) {
                     case 'left':
                         x = partnerAbsPos.x + (partnerConn.size.width || 0); // Place to the right of partner
                         y = partnerAbsPos.y; // Align vertically
                         break;
                     case 'right':
                         x = partnerAbsPos.x - width; // Place to the left of partner
                         y = partnerAbsPos.y; // Align vertically
                         break;
                     case 'top':
                         x = partnerAbsPos.x; // Align horizontally
                         y = partnerAbsPos.y + (partnerConn.size.height || 0); // Place below partner
                         break;
                     case 'bottom':
                         x = partnerAbsPos.x; // Align horizontally
                         y = partnerAbsPos.y - height; // Place above partner
                         break;
                 }
                 // Adjust for connector size to ensure edges touch
                 if (partnerEdge === 'left' || partnerEdge === 'right') {
                     y = partnerAbsPos.y + (partnerConn.size.height - height) / 2;
                 } else { // top or bottom
                     x = partnerAbsPos.x + (partnerConn.size.width - width) / 2;
                 }

                 return { x, y };
            }
        }


        // --- RENDER FUNCTIONS ---
        function renderContainers(project) {
            const containers = project.data.containers || [];
            const entityMap = {};
            const containerMap = {};

            // Build maps
            containers.forEach(c => {
                entityMap[c.id] = c;
                containerMap[c.id] = c;
            });

            $svgViewport.innerHTML = ''; // Clear viewport

            // Recursive function to render container and its children
            function renderContainerRecursive(containerId, parentGroup) {
                const container = containerMap[containerId];
                if (!container) return;

                const absPos = getAbsolutePosition(container.id, entityMap, containerMap);

                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('id', `g-${container.id}`);

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', absPos.x);
                rect.setAttribute('y', absPos.y);
                rect.setAttribute('width', container.size.width);
                rect.setAttribute('height', container.size.height);
                rect.setAttribute('rx', '10'); // Rounded corners
                rect.setAttribute('ry', '10');
                rect.setAttribute('fill', 'rgba(60, 60, 80, 0.2)');
                rect.setAttribute('stroke', '#6b7280');
                rect.setAttribute('stroke-width', '1');
                rect.setAttribute('class', 'svg-element');
                rect.setAttribute('data-type', 'container');
                rect.setAttribute('data-id', container.id);

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', absPos.x + 10);
                text.setAttribute('y', absPos.y + 25);
                text.setAttribute('fill', 'white');
                text.setAttribute('font-size', '16');
                text.setAttribute('font-family', 'Arial, sans-serif');
                text.textContent = container.name || container.id;

                g.appendChild(rect);
                g.appendChild(text);

                // Recursively add child containers
                containers.forEach(child => {
                    if (child.parent_id === container.id) {
                        renderContainerRecursive(child.id, g);
                    }
                });

                parentGroup.appendChild(g);
            }

            // Find root containers (parent_id is null)
            containers.forEach(container => {
                if (container.parent_id === null) {
                    renderContainerRecursive(container.id, $svgViewport);
                }
            });
        }

        function renderConnectors(project) {
            const connectors = project.data.connectors || [];
            const entityMap = {};
            const containerMap = {};

            // Build maps
            project.data.containers.forEach(c => {
                entityMap[c.id] = c;
                containerMap[c.id] = c;
            });
            connectors.forEach(c => {
                entityMap[c.id] = c;
            });

            // Create a group for connectors
            let connectorGroup = $svgViewport.querySelector('#connectors-group');
            if (!connectorGroup) {
                connectorGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                connectorGroup.setAttribute('id', 'connectors-group');
                $svgViewport.appendChild(connectorGroup);
            } else {
                connectorGroup.innerHTML = '';
            }

            connectors.forEach(conn => {
                if (conn.mountType === 'flying' && (!conn.matedId || !project.data.mates.some(m => m.id === conn.matedId))) {
                    // Skip rendering flying connectors without valid partners
                    console.log(`[renderConnectors] Skipping flying connector ${conn.id} without valid partner.`);
                    return;
                }

                const absPos = getAbsolutePositionForConnector(conn.id, entityMap, containerMap);

                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('id', `g-${conn.id}`);

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', absPos.x);
                rect.setAttribute('y', absPos.y);
                rect.setAttribute('width', conn.size.width);
                rect.setAttribute('height', conn.size.height);
                rect.setAttribute('fill', conn.gender === 'male' ? 'rgba(100, 100, 120, 0.4)' : 'rgba(80, 80, 100, 0.4)');
                rect.setAttribute('stroke', '#9ca3af');
                rect.setAttribute('stroke-width', '1');
                rect.setAttribute('class', 'svg-element');
                rect.setAttribute('data-type', 'connector');
                rect.setAttribute('data-id', conn.id);

                g.appendChild(rect);

                // Draw pins
                const pins = conn.pins || 0;
                const spacing = conn.edgeSide === 'left' || conn.edgeSide === 'right' ?
                    conn.size.height / (pins + 1) :
                    conn.size.width / (pins + 1);

                for (let i = 1; i <= pins; i++) {
                    const pinCenterX = conn.edgeSide === 'left' || conn.edgeSide === 'right' ?
                        absPos.x + (conn.edgeSide === 'left' ? -5 : conn.size.width + 5) :
                        absPos.x + (spacing * i);
                    const pinCenterY = conn.edgeSide === 'top' || conn.edgeSide === 'bottom' ?
                        absPos.y + (conn.edgeSide === 'top' ? -5 : conn.size.height + 5) :
                        absPos.y + (spacing * i);

                    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.setAttribute('cx', pinCenterX);
                    circle.setAttribute('cy', pinCenterY);
                    circle.setAttribute('r', '5');
                    circle.setAttribute('fill', '#d1d5db');
                    circle.setAttribute('stroke', '#9ca3af');
                    circle.setAttribute('stroke-width', '1');
                    circle.setAttribute('class', 'svg-pin');
                    circle.setAttribute('data-connector-id', conn.id);
                    circle.setAttribute('data-pin', i);

                    g.appendChild(circle);
                }

                connectorGroup.appendChild(g);
            });
        }

        function renderWires(project) {
            const wires = project.data.wires || [];
            const connectors = project.data.connectors || [];
            const entityMap = {};
            const containerMap = {};

            // Build maps
            project.data.containers.forEach(c => {
                entityMap[c.id] = c;
                containerMap[c.id] = c;
            });
            connectors.forEach(c => {
                entityMap[c.id] = c;
            });
            wires.forEach(w => {
                entityMap[w.id] = w;
            });

            // Create a group for wires
            let wireGroup = $svgViewport.querySelector('#wires-group');
            if (!wireGroup) {
                wireGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                wireGroup.setAttribute('id', 'wires-group');
                $svgViewport.appendChild(wireGroup);
            } else {
                wireGroup.innerHTML = '';
            }

            wires.forEach(wire => {
                console.log(`[renderWires] Processing wire ${wire.id}: from=${wire.from?.connector}.${wire.from?.pin} to=${wire.to?.connector}.${wire.to?.pin}`);

                const fromConn = connectors.find(c => c.id === wire.from?.connector);
                const toConn = connectors.find(c => c.id === wire.to?.connector);

                if (!fromConn) {
                    console.warn(`[renderWires] Wire ${wire.id}: from connector ${wire.from?.connector} not found, skipping`);
                    return; // Skip rendering this wire
                }
                if (!toConn) {
                    console.warn(`[renderWires] Wire ${wire.id}: to connector ${wire.to?.connector} not found, skipping`);
                    return; // Skip rendering this wire
                }

                console.log(`[renderWires] Wire ${wire.id}: fromConn=${fromConn.id} (mountType=${fromConn.mountType}, matedId=${fromConn.matedId}), toConn=${toConn.id} (mountType=${toConn.mountType}, matedId=${toConn.matedId})`);

                // Check for valid ends (skip if either connector is flying without partner)
                if (
                    (fromConn.mountType === 'flying' && (!fromConn.matedId || !project.data.mates.some(m => m.id === fromConn.matedId))) ||
                    (toConn.mountType === 'flying' && (!toConn.matedId || !project.data.mates.some(m => m.id === toConn.matedId)))
                ) {
                    console.warn(`[renderWires] Wire ${wire.id}: Skipping because flying connector has invalid/missing matedId`);
                    return; // Skip rendering this wire
                }

                const fromPos = getAbsolutePositionForConnector(wire.from?.connector, entityMap, containerMap);
                const toPos = getAbsolutePositionForConnector(wire.to?.connector, entityMap, containerMap);

                console.log(`[renderWires] Wire ${wire.id}: fromPos=(${fromPos.x}, ${fromPos.y}), toPos=(${toPos.x}, ${toPos.y})`);

                if (!fromPos || !toPos || (fromPos.x === 0 && fromPos.y === 0) || (toPos.x === 0 && toPos.y === 0)) {
                    console.warn(`[renderWires] Wire ${wire.id}: Skipping because position is invalid (0,0)`);
                    return; // Skip rendering this wire
                }

                const fromPinIndex = wire.from?.pin || 1;
                const toPinIndex = wire.to?.pin || 1;

                // Calculate pin positions based on connector size and edgeSide
                const fromPinSpacing = fromConn.edgeSide === 'left' || fromConn.edgeSide === 'right' ?
                    fromConn.size.height / (fromConn.pins + 1) :
                    fromConn.size.width / (fromConn.pins + 1);
                const toPinSpacing = toConn.edgeSide === 'left' || toConn.edgeSide === 'right' ?
                    toConn.size.height / (toConn.pins + 1) :
                    toConn.size.width / (toConn.pins + 1);

                let fromPinX = fromPos.x, fromPinY = fromPos.y;
                let toPinX = toPos.x, toPinY = toPos.y;

                if (fromConn.edgeSide === 'left' || fromConn.edgeSide === 'right') {
                    fromPinX = fromPos.x + (fromConn.edgeSide === 'left' ? -5 : fromConn.size.width + 5);
                    fromPinY = fromPos.y + (fromPinSpacing * fromPinIndex);
                } else { // top or bottom
                    fromPinX = fromPos.x + (fromPinSpacing * fromPinIndex);
                    fromPinY = fromPos.y + (fromConn.edgeSide === 'top' ? -5 : fromConn.size.height + 5);
                }

                if (toConn.edgeSide === 'left' || toConn.edgeSide === 'right') {
                    toPinX = toPos.x + (toConn.edgeSide === 'left' ? -5 : toConn.size.width + 5);
                    toPinY = toPos.y + (toPinSpacing * toPinIndex);
                } else { // top or bottom
                    toPinX = toPos.x + (toPinSpacing * toPinIndex);
                    toPinY = toPos.y + (toConn.edgeSide === 'top' ? -5 : toConn.size.height + 5);
                }

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                // Calculate control points for Bézier curve
                const cx = Math.max(50, Math.abs(toPinX - fromPinX) * 0.4);
                const pathData = `M ${fromPinX},${fromPinY} C ${fromPinX + cx},${fromPinY} ${toPinX - cx},${toPinY} ${toPinX},${toPinY}`;

                path.setAttribute('d', pathData);
                path.setAttribute('fill', 'none');

                // Resolve color from catalog
                const colorPalette = project.metadata.catalogs.colorPalette || {};
                const colorKey = wire.color || 'gray'; // Default to gray if no color specified
                const resolvedColor = colorPalette[colorKey] || '#6b7280'; // Fallback to gray if not in palette
                path.setAttribute('stroke', resolvedColor);

                const thickness = wire.thickness || 2;
                path.setAttribute('stroke-width', thickness.toString());
                path.setAttribute('class', 'svg-element');
                path.setAttribute('data-type', 'wire');
                path.setAttribute('data-id', wire.id);

                wireGroup.appendChild(path);

                console.log(`[renderWires] Wire ${wire.id}: RENDERED successfully`);
            });
        }

        function renderMates(project) {
            // Mates are visualized implicitly by the positioning of connectors.
            // No additional rendering needed here beyond ensuring connectors are positioned correctly.
            // The logic for connector positioning already handles the "facing" aspect of mates.
        }

        function renderSVG() {
            if (!state.project) return;
            renderContainers(state.project);
            renderConnectors(state.project);
            renderWires(state.project);
            renderMates(state.project);
            applySelectionHighlight();
            // NO llamar applyTransform() aquí
        }

        // --- SELECTION ---
        function selectEntity(type, id) {
            updateState({ selectedEntity: { type, id } });
            updateState({ sidebarState: 'details' });
        }

        function deselectEntity() {
            updateState({ selectedEntity: null });
        }

        function applySelectionHighlight() {
            // Remove highlight from all elements
            document.querySelectorAll('.svg-element').forEach(el => {
                el.classList.remove('selection-glow');
                if (el.tagName === 'rect' || el.tagName === 'path') {
                    el.setAttribute('stroke', el.getAttribute('original-stroke') || el.getAttribute('stroke'));
                    el.setAttribute('stroke-width', el.getAttribute('original-stroke-width') || el.getAttribute('stroke-width'));
                }
            });

            // Apply highlight to selected element if exists
            if (state.selectedEntity) {
                const { type, id } = state.selectedEntity;
                const element = document.querySelector(`.svg-element[data-type="${type}"][data-id="${id}"]`);
                if (element) {
                    element.classList.add('selection-glow');
                    // Store original attributes before changing them
                    if (element.tagName === 'rect' || element.tagName === 'path') {
                        element.setAttribute('original-stroke', element.getAttribute('stroke'));
                        element.setAttribute('original-stroke-width', element.getAttribute('stroke-width'));
                        element.setAttribute('stroke', '#fbbf24'); // Accent secondary
                        element.setAttribute('stroke-width', '3');
                    }
                }
            }
        }

        // --- INTERACTION ---
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragElement = null;
        let dragElementType = '';
        let dragOriginalData = null;
        let isPanning = false;
        let panStart = { x: 0, y: 0 };
        let panStartState = { x: 0, y: 0 };

        function handleMouseDown(e) {
            if (!state.editMode) return;

            const target = e.target;
            if (target.classList.contains('svg-element')) {
                isDragging = true;
                dragElement = target;
                dragElementType = target.getAttribute('data-type');
                const id = target.getAttribute('data-id');

                const svgRect = $svgCanvas.getBoundingClientRect();
                dragStart = {
                    x: e.clientX - svgRect.left,
                    y: e.clientY - svgRect.top
                };

                if (dragElementType === 'container') {
                    const container = state.project.data.containers.find(c => c.id === id);
                    if (container) {
                        dragOriginalData = {
                            id: container.id,
                            parent_id: container.parent_id,
                            position: { ...container.position } // Clone position
                        };
                    }
                } else if (dragElementType === 'connector') {
                    const connector = state.project.data.connectors.find(c => c.id === id);
                    if (connector && connector.mountType === 'fixed') { // Only allow dragging fixed connectors
                        dragOriginalData = {
                            id: connector.id,
                            parent_id: connector.parent_id,
                            edgeSide: connector.edgeSide,
                            offset: connector.offset
                        };
                    } else {
                        isDragging = false; // Reset if trying to drag a flying connector
                    }
                }

                e.preventDefault(); // Prevent text selection
            } else if (e.button === 1) { // Middle mouse button for pan
                 isPanning = true;
                 const svgRect = $svgCanvas.getBoundingClientRect();
                 panStart = {
                     x: e.clientX - svgRect.left,
                     y: e.clientY - svgRect.top
                 };
                 panStartState = { ...state.pan };
                 e.preventDefault();
             }
        }

        function handleMouseMove(e) {
            if (!isDragging && !isPanning) return;

            const svgRect = $svgCanvas.getBoundingClientRect();
            const currentPos = {
                x: e.clientX - svgRect.left,
                y: e.clientY - svgRect.top
            };

            if (isPanning) {
                const deltaX = currentPos.x - panStart.x;
                const deltaY = currentPos.y - panStart.y;

                updateState({
                    pan: {
                        x: panStartState.x + deltaX,
                        y: panStartState.y + deltaY
                    }
                });

                panStart = { x: currentPos.x, y: currentPos.y };
                panStartState = { ...state.pan };
                return;
            }

            if (isDragging && dragElement && state.project && state.editMode) {
                const deltaX = (currentPos.x - dragStart.x) / state.zoom;
                const deltaY = (currentPos.y - dragStart.y) / state.zoom;

                dragStart = { x: currentPos.x, y: currentPos.y };

                if (dragElementType === 'container') {
                    const updatedProject = structuredClone(state.project);
                    const containerToUpdate = updatedProject.data.containers.find(c => c.id === dragOriginalData.id);

                    if (containerToUpdate) {
                        if (containerToUpdate.parent_id === null) {
                            containerToUpdate.position.x += deltaX;
                            containerToUpdate.position.y += deltaY;
                        } else {
                            containerToUpdate.position.offsetX += deltaX;
                            containerToUpdate.position.offsetY += deltaY;
                        }
                    }

                    updateState({ project: updatedProject });
                    markDirty();

                } else if (dragElementType === 'connector' && dragOriginalData) {
                    const container = state.project.data.containers.find(c => c.id === dragOriginalData.parent_id);
                    if (!container) return;

                    const svgX = (currentPos.x - state.pan.x) / state.zoom;
                    const svgY = (currentPos.y - state.pan.y) / state.zoom;

                    const entityMap = {};
                    const containerMap = {};
                    state.project.data.containers.forEach(c => {
                        entityMap[c.id] = c;
                        containerMap[c.id] = c;
                    });
                    const absPos = getAbsolutePosition(container.id, entityMap, containerMap);

                    const relX = svgX - absPos.x;
                    const relY = svgY - absPos.y;

                    let newEdgeSide = dragOriginalData.edgeSide;
                    let newOffset = dragOriginalData.offset;

                    const threshold = 30;
                    const connectorInState = state.project.data.connectors.find(c => c.id === dragOriginalData.id);
                    const connWidth = connectorInState?.size?.width || 180;
                    const connHeight = connectorInState?.size?.height || 115;

                    if (relX < threshold && relY > threshold && relY < (container.size.height - threshold)) {
                        newEdgeSide = 'left';
                        newOffset = Math.max(0, Math.min(container.size.height - connHeight, relY - connHeight / 2));
                    } else if (relX > (container.size.width - threshold) && relY > threshold && relY < (container.size.height - threshold)) {
                        newEdgeSide = 'right';
                        newOffset = Math.max(0, Math.min(container.size.height - connHeight, relY - connHeight / 2));
                    } else if (relY < threshold && relX > threshold && relX < (container.size.width - threshold)) {
                        newEdgeSide = 'top';
                        newOffset = Math.max(0, Math.min(container.size.width - connWidth, relX - connWidth / 2));
                    } else if (relY > (container.size.height - threshold) && relX > threshold && relX < (container.size.width - threshold)) {
                        newEdgeSide = 'bottom';
                        newOffset = Math.max(0, Math.min(container.size.width - connWidth, relX - connWidth / 2));
                    } else {
                        switch (dragOriginalData.edgeSide) {
                            case 'left':
                            case 'right':
                                newOffset = Math.max(0, Math.min(container.size.height - connHeight, relY - connHeight / 2));
                                break;
                            case 'top':
                            case 'bottom':
                                newOffset = Math.max(0, Math.min(container.size.width - connWidth, relX - connWidth / 2));
                                break;
                        }
                    }

                    const updatedProject = structuredClone(state.project);
                    const connectorToUpdate = updatedProject.data.connectors.find(c => c.id === dragOriginalData.id);
                    if (connectorToUpdate) {
                        connectorToUpdate.edgeSide = newEdgeSide;
                        connectorToUpdate.offset = newOffset;
                    }
                    updateState({ project: updatedProject });
                    markDirty();
                }
            }
        }

        function handleMouseUp(e) {
            if (isDragging) {
                isDragging = false;
                dragElement = null;
                dragOriginalData = null;
            }
            if (isPanning) {
                isPanning = false;
            }
        }

        function handleClick(e) {
            if (e.target.classList.contains('svg-element')) {
                const type = e.target.getAttribute('data-type');
                const id = e.target.getAttribute('data-id');
                selectEntity(type, id);
            } else if (e.target.id === 'svg-canvas' || e.target.id === 'viewport') {
                // Clicked on background
                deselectEntity();
            }
        }

        function handleWheel(e) {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.1 : 0.1; // Sensitivity
            const newZoom = Math.max(0.2, Math.min(3.0, state.zoom + delta));

            // Get mouse position relative to SVG
            const rect = $svgCanvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // Calculate how much the pan needs to change to keep the mouse position fixed
            const zoomFactor = newZoom / state.zoom;
            const newPanX = state.pan.x + (mouseX * (1 - zoomFactor));
            const newPanY = state.pan.y + (mouseY * (1 - zoomFactor));

            updateState({
                zoom: newZoom,
                pan: { x: newPanX, y: newPanY }
            });
            applyTransform();
        }

        function applyTransform() {
            const transform = `translate(${state.pan.x}px, ${state.pan.y}px) scale(${state.zoom})`;
            $svgViewport.style.transform = transform;
            $svgViewport.style.transformOrigin = '0 0';
        }

        // --- Keyboard Shortcuts ---
        function handleKeyDown(e) {
            if (e.key === 'Escape') {
                deselectEntity();
            }
        }

        // --- Event Listeners ---
        $svgCanvas.addEventListener('mousedown', handleMouseDown);
        $svgCanvas.addEventListener('mousemove', handleMouseMove);
        $svgCanvas.addEventListener('mouseup', handleMouseUp);
        $svgCanvas.addEventListener('mouseleave', handleMouseUp); // Release drag if mouse leaves
        $svgCanvas.addEventListener('click', handleClick);
        $svgCanvas.addEventListener('wheel', handleWheel, { passive: false }); // Passive false for preventDefault
        document.addEventListener('keydown', handleKeyDown);


        // Subscribe UI updates to state changes
        subscribe((newState, oldState) => {
            syncStateToUI(newState);
            if (newState.logs !== oldState.logs) {
                renderLogs(newState.logs);
            }

            if (newState.project !== oldState.project ||
                newState.activeView !== oldState.activeView ||
                newState.selectedEntity !== oldState.selectedEntity) {
                if (newState.activeView === 'visual') {
                    renderSVG();
                }
            }

            if (newState.zoom !== oldState.zoom || newState.pan !== oldState.pan) {
                applyTransform();
            }
        });

        // --- MODAL Functions ---
        function showModal(title, message, buttons = ['ok']) {
            $modalTitle.textContent = title;
            $modalMessage.textContent = message;

            // Hide all buttons first
            $modalBtnOk.style.display = 'none';
            $modalBtnCancel.style.display = 'none';
            $modalBtnExport.style.display = 'none';
            $modalBtnDiscard.style.display = 'none';
            $modalBtnRestore.style.display = 'none';
            $modalBtnDiscardAutosave.style.display = 'none';

            // Show requested buttons
            buttons.forEach(btn => {
                switch(btn) {
                    case 'ok': $modalBtnOk.style.display = 'inline-block'; break;
                    case 'cancel': $modalBtnCancel.style.display = 'inline-block'; break;
                    case 'export': $modalBtnExport.style.display = 'inline-block'; break;
                    case 'discard': $modalBtnDiscard.style.display = 'inline-block'; break;
                    case 'restore': $modalBtnRestore.style.display = 'inline-block'; break;
                    case 'discard_autosave': $modalBtnDiscardAutosave.style.display = 'inline-block'; break;
                }
            });

            $modalOverlay.style.display = 'flex';
        }

        function hideModal() {
            $modalOverlay.style.display = 'none';
        }

        // --- Validate Incompatible Fields ---
        function hasIncompatibleFields(projectJson) {
            const errors = [];
            // Check metadata.uiSettings
            if (projectJson.metadata && projectJson.metadata.uiSettings) {
                errors.push("metadata.uiSettings");
            }
            // Check data.nets
            if (projectJson.data && projectJson.data.nets && projectJson.data.nets.length > 0) {
                errors.push("data.nets");
            }
            // Check metadata.revision
            if (projectJson.metadata && projectJson.metadata.revision !== undefined) {
                errors.push("metadata.revision");
            }
            // Iterate through data arrays to check for obsolete fields
            ['connectors', 'wires', 'mates'].forEach(type => {
                if (projectJson.data && projectJson.data[type]) {
                    projectJson.data[type].forEach(entity => {
                        if (entity.signalTypeRef) errors.push(`signalTypeRef in ${type}`);
                        if (type === 'connectors' && entity.sectionRef) errors.push(`sectionRef in connectors`);
                        // Check nets for shield field
                        if (type === 'nets' && entity.shield !== undefined) errors.push(`shield in signalType of nets`);
                    });
                }
            });

            return errors;
        }

        // --- VALIDATION FUNCTION ---
        function validateProject(project) {
            if (!project || !project.metadata || !project.data) {
                return [{ level: 'error', message: 'Project structure is invalid (missing metadata or data)', entityId: null, timestamp: new Date().toISOString() }];
            }
            const logs = [];
            const schema = project.metadata.schema || {};
            const catalogs = project.metadata.catalogs || {};

            // Helper to get catalog IDs
            const getCatalogIds = (catalogName) => Object.keys(catalogs[catalogName] || {});

            // --- Schema Validation ---
            ['containers', 'connectors', 'wires', 'mates'].forEach(type => {
                const entities = project.data[type] || [];
                const typeSchema = schema[type] || {};
                const required = typeSchema.required || [];
                const recommended = typeSchema.recommended || [];

                // Unique IDs check
                const seenIds = new Set();
                entities.forEach(entity => {
                    if (seenIds.has(entity.id)) {
                        logs.push({ level: 'error', message: `Duplicate ID '${entity.id}' found in ${type}`, entityId: entity.id, timestamp: new Date().toISOString() });
                    }
                    seenIds.add(entity.id);

                    // Required fields check
                    required.forEach(field => {
                        if (entity[field] === undefined) {
                            logs.push({ level: 'error', message: `Required field '${field}' is missing in ${type} ${entity.id}`, entityId: entity.id, timestamp: new Date().toISOString() });
                        }
                    });

                    // Recommended fields check
                    recommended.forEach(field => {
                        if (entity[field] === undefined) {
                            logs.push({ level: 'warning', message: `Recommended field '${field}' is missing in ${type} ${entity.id}`, entityId: entity.id, timestamp: new Date().toISOString() });
                        }
                    });

                    // Pattern check for ID
                    if (type === 'containers' && !/^T\d{3}$/.test(entity.id)) {
                        logs.push({ level: 'error', message: `Invalid ID pattern for container ${entity.id}`, entityId: entity.id, timestamp: new Date().toISOString() });
                    } else if (type === 'connectors' && !/^C\d{3}$/.test(entity.id)) {
                        logs.push({ level: 'error', message: `Invalid ID pattern for connector ${entity.id}`, entityId: entity.id, timestamp: new Date().toISOString() });
                    } else if (type === 'wires' && !/^W\d{3}$/.test(entity.id)) {
                        logs.push({ level: 'error', message: `Invalid ID pattern for wire ${entity.id}`, entityId: entity.id, timestamp: new Date().toISOString() });
                    } else if (type === 'mates' && !/^M\d{3}$/.test(entity.id)) {
                        logs.push({ level: 'error', message: `Invalid ID pattern for mate ${entity.id}`, entityId: entity.id, timestamp: new Date().toISOString() });
                    }
                });
            });

            // --- Reference Validation (CORRECTED) ---
            // Collect IDs from data arrays
            const dataContainerIds = new Set((project.data.containers || []).map(c => c.id));
            const dataConnectorIds = new Set((project.data.connectors || []).map(c => c.id));
            // Collect IDs from catalogs
            const catalogKeys = {
                people: new Set(Object.keys(catalogs.people || {})),
                sections: new Set(Object.keys(catalogs.sections || {})),
                connectorModels: new Set(Object.keys(catalogs.connectorModels || {})),
                wireTypes: new Set(Object.keys(catalogs.wireTypes || {})),
                nets: new Set(Object.keys(catalogs.nets || {})),
                colorPalette: new Set(Object.keys(catalogs.colorPalette || {}))
            };

            // Validate containers
            project.data.containers.forEach(cont => {
                if (cont.parent_id && cont.parent_id !== null && !dataContainerIds.has(cont.parent_id)) {
                    logs.push({ level: 'error', message: `Container ${cont.id} has invalid parent_id`, entityId: cont.id, timestamp: new Date().toISOString() });
                }
                if (cont.sectionRef && !catalogKeys.sections.has(cont.sectionRef)) {
                    logs.push({ level: 'error', message: `Container ${cont.id} has invalid sectionRef`, entityId: cont.id, timestamp: new Date().toISOString() });
                }
                if (cont.owner && !catalogKeys.people.has(cont.owner)) {
                    logs.push({ level: 'error', message: `Container ${cont.id} has invalid owner`, entityId: cont.id, timestamp: new Date().toISOString() });
                }
            });

            // Mate IDs set for validations
            const mateIds = new Set((project.data.mates || []).map(m => m.id));

            // Validate connectors
            project.data.connectors.forEach(conn => {
                if (conn.parent_id && !dataContainerIds.has(conn.parent_id)) {
                    logs.push({ level: 'error', message: `Connector ${conn.id} has invalid parent_id`, entityId: conn.id, timestamp: new Date().toISOString() });
                }
                if (conn.modelRef && !catalogKeys.connectorModels.has(conn.modelRef)) {
                    logs.push({ level: 'error', message: `Connector ${conn.id} has invalid modelRef`, entityId: conn.id, timestamp: new Date().toISOString() });
                }
                if (conn.owner && !catalogKeys.people.has(conn.owner)) {
                    logs.push({ level: 'error', message: `Connector ${conn.id} has invalid owner`, entityId: conn.id, timestamp: new Date().toISOString() });
                }
                // FIX 4a: Flying with non-existent matedId
                if (conn.mountType === 'flying' && conn.matedId && !mateIds.has(conn.matedId)) {
                    logs.push({ level: 'error', message: `Flying connector ${conn.id} references non-existent matedId '${conn.matedId}'`, entityId: conn.id, timestamp: new Date().toISOString() });
                }
                // FIX 4b: Fixed without partner -> Info
                if (conn.mountType === 'fixed' && !conn.matedId) {
                    logs.push({ level: 'info', message: `Fixed connector ${conn.id} has no partner (may be intentional)`, entityId: conn.id, timestamp: new Date().toISOString() });
                }
            });

            // Validate wires
            project.data.wires.forEach(wire => {
                if (wire.from?.connector && !dataConnectorIds.has(wire.from.connector)) {
                    logs.push({ level: 'error', message: `Wire ${wire.id} has invalid from.connector`, entityId: wire.id, timestamp: new Date().toISOString() });
                }
                if (wire.to?.connector && !dataConnectorIds.has(wire.to.connector)) {
                    logs.push({ level: 'error', message: `Wire ${wire.id} has invalid to.connector`, entityId: wire.id, timestamp: new Date().toISOString() });
                }
                if (wire.net && !catalogKeys.nets.has(wire.net)) {
                    logs.push({ level: 'error', message: `Wire ${wire.id} has invalid net`, entityId: wire.id, timestamp: new Date().toISOString() });
                }
                if (wire.wireTypeRef && !catalogKeys.wireTypes.has(wire.wireTypeRef)) { // CORRECTION: Changed wireTypeRef to wire.wireTypeRef
                    logs.push({ level: 'error', message: `Wire ${wire.id} has invalid wireTypeRef`, entityId: wire.id, timestamp: new Date().toISOString() });
                }
                if (wire.owner && !catalogKeys.people.has(wire.owner)) {
                    logs.push({ level: 'error', message: `Wire ${wire.id} has invalid owner`, entityId: wire.id, timestamp: new Date().toISOString() });
                }
            });

            // Validate mates
            project.data.mates.forEach(mate => {
                if (mate.from?.connector && !dataConnectorIds.has(mate.from.connector)) {
                    logs.push({ level: 'error', message: `Mate ${mate.id} has invalid from.connector`, entityId: mate.id, timestamp: new Date().toISOString() });
                }
                if (mate.to?.connector && !dataConnectorIds.has(mate.to.connector)) {
                    logs.push({ level: 'error', message: `Mate ${mate.id} has invalid to.connector`, entityId: mate.id, timestamp: new Date().toISOString() });
                }
                if (mate.net && !catalogKeys.nets.has(mate.net)) {
                    logs.push({ level: 'error', message: `Mate ${mate.id} has invalid net`, entityId: mate.id, timestamp: new Date().toISOString() });
                }
                if (mate.owner && !catalogKeys.people.has(mate.owner)) {
                    logs.push({ level: 'error', message: `Mate ${mate.id} has invalid owner`, entityId: mate.id, timestamp: new Date().toISOString() });
                }
            });

            // --- Business Rules ---
            project.data.mates.forEach(mate => {
                const fromConn = project.data.connectors.find(c => c.id === mate.from.connector);
                const toConn = project.data.connectors.find(c => c.id === mate.to.connector);

                // 10.1: Opposite genders
                if (fromConn && toConn && fromConn.gender === toConn.gender) {
                    logs.push({ level: 'error', message: `Mate ${mate.id} connects connectors with same gender (${fromConn.gender})`, entityId: mate.id, timestamp: new Date().toISOString() });
                }

                // 10.2: Bidirectional matedId
                if (fromConn && fromConn.matedId !== mate.id) {
                    logs.push({ level: 'error', message: `Connector ${fromConn.id} matedId does not match mate ${mate.id}`, entityId: fromConn.id, timestamp: new Date().toISOString() });
                }
                if (toConn && toConn.matedId !== mate.id) {
                    logs.push({ level: 'error', message: `Connector ${toConn.id} matedId does not match mate ${mate.id}`, entityId: toConn.id, timestamp: new Date().toISOString() });
                }

                // FIX 6: Inverse case - connector with matedId not in any M
                const mateMap = new Map((project.data.mates || []).map(m => [m.id, m]));
                project.data.connectors.forEach(conn => {
                    if (conn.matedId) {
                        const mate = mateMap.get(conn.matedId);
                        if (!mate) {
                            logs.push({ level: 'error', message: `Connector ${conn.id} references non-existent matedId '${conn.matedId}'`, entityId: conn.id, timestamp: new Date().toISOString() });
                        } else if (mate.from?.connector !== conn.id && mate.to?.connector !== conn.id) {
                            logs.push({ level: 'error', message: `Connector ${conn.id} has matedId '${conn.matedId}' but is not in that mate`, entityId: conn.id, timestamp: new Date().toISOString() });
                        }
                    }
                });

                // 10.4: Fixed + Flying
                if ((fromConn && fromConn.mountType === 'fixed') && (toConn && toConn.mountType === 'flying')) {
                    // Valid case
                } else if ((fromConn && fromConn.mountType === 'flying') && (toConn && toConn.mountType === 'fixed')) {
                    // Also valid case
                } else {
                    // Both fixed or both flying
                    if ((fromConn && fromConn.mountType === 'fixed') && (toConn && toConn.mountType === 'fixed')) {
                        logs.push({ level: 'error', message: `Mate ${mate.id} connects two fixed connectors`, entityId: mate.id, timestamp: new Date().toISOString() });
                    }
                    if ((fromConn && fromConn.mountType === 'flying') && (toConn && toConn.mountType === 'flying')) {
                        logs.push({ level: 'error', message: `Mate ${mate.id} connects two flying connectors`, entityId: mate.id, timestamp: new Date().toISOString() });
                    }
                }

                // 10.10: Pin alignment (2px threshold)
                if (fromConn && toConn && fromConn.edgeSide === toConn.edgeSide && fromConn.parent_id === toConn.parent_id) {
                    const offsetDiff = Math.abs(fromConn.offset - toConn.offset);
                    if (offsetDiff > 2) {
                        logs.push({ level: 'warning', message: `Mate ${mate.id}: Pin alignment exceeds threshold (${offsetDiff}px)`, entityId: mate.id, timestamp: new Date().toISOString() });
                    }
                }
            });

            // 10.16: Depth limit and cycle detection
            const containerMap = new Map((project.data.containers || []).map(c => [c.id, c]));
            project.data.containers.forEach(c => {
                const chain = new Set();
                let current = c;
                let depth = 0;
                while (current) {
                    if (chain.has(current.id)) {
                        logs.push({ level: 'error', message: `Hierarchical cycle detected in ${c.id}`, entityId: c.id, timestamp: new Date().toISOString() });
                        break;
                    }
                    if (depth > 3) {
                        logs.push({ level: 'error', message: `Hierarchy too deep in ${c.id} (maximum 4 levels)`, entityId: c.id, timestamp: new Date().toISOString() });
                        break;
                    }
                    chain.add(current.id);
                    current = current.parent_id ? containerMap.get(current.parent_id) : null;
                    depth++;
                }
            });

            // 10.5: Valid pins (mates only - see 10.5b for wires)
            project.data.mates.forEach(mate => {
                const fromConn = project.data.connectors.find(c => c.id === mate.from.connector);
                const toConn = project.data.connectors.find(c => c.id === mate.to.connector);

                if (fromConn && fromConn.pins && mate.from.pin) {
                    if (mate.from.pin > fromConn.pins) {
                        logs.push({ level: 'error', message: `Mate ${mate.id} references invalid pin ${mate.from.pin} for connector ${fromConn.id} (has ${fromConn.pins} pins)`, entityId: mate.from.connector, timestamp: new Date().toISOString() });
                    }
                }
                if (toConn && toConn.pins && mate.to.pin) {
                    if (mate.to.pin > toConn.pins) {
                        logs.push({ level: 'error', message: `Mate ${mate.id} references invalid pin ${mate.to.pin} for connector ${toConn.id} (has ${toConn.pins} pins)`, entityId: mate.to.connector, timestamp: new Date().toISOString() });
                    }
                }
            });

            // 10.5b: Valid pins in WIRES (FIX 5)
            project.data.wires.forEach(wire => {
                const fromConn = project.data.connectors.find(c => c.id === wire.from?.connector);
                const toConn = project.data.connectors.find(c => c.id === wire.to?.connector);
                if (fromConn && fromConn.pins && wire.from?.pin > fromConn.pins) {
                    logs.push({ level: 'error', message: `Wire ${wire.id} references invalid pin ${wire.from.pin} for connector ${fromConn.id} (has ${fromConn.pins} pins)`, entityId: wire.id, timestamp: new Date().toISOString() });
                }
                if (toConn && toConn.pins && wire.to?.pin > toConn.pins) {
                    logs.push({ level: 'error', message: `Wire ${wire.id} references invalid pin ${wire.to.pin} for connector ${toConn.id} (has ${toConn.pins} pins)`, entityId: wire.id, timestamp: new Date().toISOString() });
                }
            });

            return logs;
        }


        // --- LOAD PROJECT ---
        async function loadProject(jsonData, source = 'load') {
            try {
                const incompatibleErrors = hasIncompatibleFields(jsonData);
                if (incompatibleErrors.length > 0) {
                    const errorMsg = `This file contains incompatible fields: ${incompatibleErrors.join(', ')}. Manually update the file to the V2.4 format.`;
                    updateState({
                        logs: [...state.logs, { level: 'error', message: `Incompatible format: ${errorMsg}`, timestamp: new Date().toISOString(), entityId: null }]
                    });
                    showModal("Incompatible format", errorMsg, ['ok']);
                    return false; // Indicate failure
                }

                // Perform full validation
                const validationLogs = validateProject(jsonData);
                const hasErrors = validationLogs.some(l => l.level === 'error');
                if (hasErrors) {
                    updateState({
                        logs: [...state.logs.filter(l => l.entityId !== null || l.level !== 'error'), ...validationLogs] // Append, potentially replacing old validation errors
                    });
                    // Optionally block load on errors, for now just warn and proceed
                    console.warn("Validation errors found during load:", validationLogs.filter(l => l.level === 'error'));
                } else {
                    // Only add validation warnings/info if no errors
                    updateState({
                        logs: [...state.logs.filter(l => l.entityId !== null || l.level !== 'error'), ...validationLogs]
                    });
                }

                updateState({ project: jsonData, isDirty: false });
                if (source === 'load') {
                    updateState({ logs: [...state.logs, { level: 'info', message: 'Project loaded successfully', timestamp: new Date().toISOString(), entityId: null }] });
                }
                return true; // Indicate success
            } catch (e) {
                console.error("Error loading project:", e);
                updateState({
                    logs: [...state.logs, { level: 'error', message: `Failed to load project: ${e.message}`, timestamp: new Date().toISOString(), entityId: null }]
                });
                return false;
            }
        }


        // --- FETCH INITIAL PROJECT ---
        async function fetchInitialProject() {
            try {
                const response = await fetch('./db.json');
                if (!response.ok) {
                    if (response.status === 404) {
                        updateState({ logs: [...state.logs, { level: 'warning', message: 'db.json not found, showing welcome screen.', timestamp: new Date().toISOString(), entityId: null }] });
                        $welcomeScreen.classList.remove('hidden');
